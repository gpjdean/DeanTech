# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

# 数据库配置
database:
  # 连接信息
  dsn: "username:password@tcp(127.0.0.1:3306)/deantech?charset=utf8mb4&parseTime=True&loc=Local"
  # 连接池配置
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime: 1h
  conn_max_idle_time: 30m
  # 优化参数
  slow_query_threshold: 200ms  # 慢查询阈值
  log_level: "info"  # 日志级别：silent, error, warn, info

# Redis配置
redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s

# 日志配置
logger:
  level: "info"  # 日志级别：debug, info, warn, error, fatal, panic
  format: "text"  # text, json
  output: "stdout"  # stdout, file
  file_path: "./logs/app.log"
  max_size: 100  # MB
  max_backups: 10
  max_age: 7  # days
  compress: true

# Prometheus配置
prometheus:
  addr: "http://localhost:9090"
  timeout: 5s
  alert_manager_url: "http://localhost:9093"

# 邮件配置
email:
  smtp_server: "smtp.example.com"
  smtp_port: 587
  sender_email: "noreply@example.com"
  username: "noreply@example.com"
  password: "password"
  encryption: "tls"  # tls, ssl, none
  enabled: false

# SLS日志服务配置
sls:
  access_key_id: ""
  access_key_secret: ""
  region_id: "cn-hangzhou"
  project: "deantech-log"
  logstore: "cluster-logs"
  timeout: 10s
  enabled: false

# API配置
api:
  prefix: "/api"
  rate_limit: 100  # 每秒请求数限制
  cors: true
  allowed_origins: ["*"]

# JWT配置
jwt:
  secret: "your-secret-key"
  expires_in: 24h
  refresh_expires_in: 72h
